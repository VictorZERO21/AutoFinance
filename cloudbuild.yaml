steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autofinance:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/autofinance:latest'
      - '.'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/autofinance:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/autofinance:$COMMIT_SHA'
      - '--location=us-central1'
      - '--config=/workspace/cloudbuild.yaml'

  # Deploy using gcloud run deploy
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'autofinance'
      - '--image=gcr.io/$PROJECT_ID/autofinance:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars=DEBUG=False'

images:
  - 'gcr.io/$PROJECT_ID/autofinance:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/autofinance:latest'
