{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFinance - Tu próximo auto, hoy</title>
    <link rel="icon" type="image/png" href="{% static 'core/images/image.png' %}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #fff; box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .brand-text { font-weight: bold; color: #800020; }

        /* Estilos de navegación */
        .nav-link-af {
            font-weight: 600;
            color: #6c757d;
            text-decoration: none;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-link-af:hover {
            color: #800020;
        }
        .nav-link-af.activo {
            color: #800020;
            border-bottom: 2px solid #800020;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4 py-3">
        <div class="container">
            <!-- Logo -->
            <a class="navbar-brand brand-text fs-4" href="/catalog/">
                <strong>AF AutoFinance</strong>
            </a>

            <!-- Tabs centrales -->
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-4">
                    <li class="nav-item">
                        <a class="nav-link-af {% if '/catalog/' in request.path %}activo{% endif %}"
                           href="/catalog/">Catálogo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-af {% if '/simulate/' in request.path or '/loan/' in request.path %}activo{% endif %}"
                           href="#">Préstamos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link-af {% if '/clients/' in request.path %}activo{% endif %}"
                           href="/clients/">Clientes</a>
                    </li>
                </ul>
            </div>

            <!-- Usuario -->
            <div class="d-flex">
                <div class="dropdown">
                    <button class="btn btn-light rounded-pill px-3 border shadow-sm dropdown-toggle"
                            type="button" data-bs-toggle="dropdown">
                        👤 {{ user.username|default:"Vendedor" }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/admin/">Panel de Control</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="handleLogout(event)">Cerrar sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        async function handleLogout(event) {
            event.preventDefault();
            
            const refreshToken = localStorage.getItem('refresh_token');
            
            if (refreshToken) {
                // Logout via API (invalida el JWT)
                try {
                    await fetch('/api/logout/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            refresh: refreshToken
                        })
                    });
                } catch (error) {
                    console.error('Error en logout:', error);
                }
            }
            
            // Limpiar localStorage
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('usuario');
            
            // Logout de sesión Django
            window.location.href = '/logout/';
        }
    </script>
</body>
</html>
