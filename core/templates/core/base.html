<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoFinance - Tu próximo auto, hoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #fff; box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .brand-text { font-weight: bold; color: #800020; /* Color vino/guinda del mockup */ }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light mb-4 py-3">
        <div class="container">
            <a class="navbar-brand brand-text fs-4" href="/catalogo/">
                <strong>AF AutoFinance</strong>
            </a>
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav mb-2 mb-lg-0 gap-4 fw-bold">
                    <li class="nav-item"><a class="nav-link active text-secondary" href="/catalogo/">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" style="border-bottom: 2px solid #800020; color: #800020 !important;" href="#">Préstamos</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="/clientes/">Clientes</a></li>
                </ul>
            </div>
            <div class="d-flex">
                <div class="dropdown">
                    <button class="btn btn-light rounded-pill px-3 border shadow-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        👤 {{ user.username|default:"Vendedor" }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/admin/">Panel de Control</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#">Cerrar sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
