services:
  postgres:
    image: postgres:16-alpine
    container_name: autofinance-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autofinance
      POSTGRES_USER: autofinance
      POSTGRES_PASSWORD: autofinance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autofinance -d autofinance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
